<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Framework - Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin
        src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        #root {
            height: 100%;
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        /* Custom Scrollbar for feature list */
        .feature-list::-webkit-scrollbar {
            width: 6px;
        }

        .feature-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .feature-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .feature-list::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        {% verbatim %}
        const { useState, useEffect, useRef } = React;

        function NASApp() {
            const [nasRunning, setNasRunning] = useState(false);
            const [nasStatus, setNasStatus] = useState({ history: [], current_status: {} });
            const [nasConfig, setNasConfig] = useState({
                target_metric: 0.95,
                patience: 5,
                problem_type: 'classification'
            });

            // Data Prep State
            const [availableColumns, setAvailableColumns] = useState([]);
            const [selectedTarget, setSelectedTarget] = useState('');
            const [selectedFeatures, setSelectedFeatures] = useState([]);
            const [splitRatio, setSplitRatio] = useState(0.8);
            const [splitMethod, setSplitMethod] = useState('random'); // 'random' or 'time'
            const [timeColumn, setTimeColumn] = useState('');

            const [preparingData, setPreparingData] = useState(false);
            const [dataPrepared, setDataPrepared] = useState(false);
            const [dataShapes, setDataShapes] = useState(null);

            // Visualization state (must be at top level per React Rules of Hooks)
            const [hoveredLayer, setHoveredLayer] = useState(null);
            const [hoveredPoint, setHoveredPoint] = useState(null);

            useEffect(() => {
                fetchColumns();
            }, []);

            useEffect(() => {
                let intervalId;
                if (nasRunning) {
                    intervalId = setInterval(fetchNasStatus, 3000);
                } else {
                    fetchNasStatus(); // Initial fetch
                }
                return () => {
                    if (intervalId) clearInterval(intervalId);
                };
            }, [nasRunning]);

            // Auto-select all features when target changes (excluding target)
            useEffect(() => {
                if (selectedTarget && availableColumns.length > 0) {
                    const features = availableColumns.filter(c => c !== selectedTarget);
                    setSelectedFeatures(features);
                }
            }, [selectedTarget, availableColumns]);

            const fetchColumns = async () => {
                try {
                    const res = await fetch('/nas/api/columns');
                    if (res.ok) {
                        const data = await res.json();
                        setAvailableColumns(data.columns);
                    } else {
                        // Redirect if no data loaded
                        const data = await res.json();
                        if (data.error === "No data loaded") {
                            window.location.href = '/eda';
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch columns", e);
                }
            };

            const fetchNasStatus = async () => {
                try {
                    const res = await fetch('/nas/api/status');
                    if (res.ok) {
                        const data = await res.json();
                        setNasStatus(data);
                        setNasRunning(data.running);
                    }
                } catch (e) {
                    console.error("Failed to fetch status", e);
                }
            };

            const handlePrepareData = async () => {
                setPreparingData(true);
                try {
                    const res = await fetch('/nas/api/prepare_data', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            target_column: selectedTarget,
                            feature_columns: selectedFeatures,
                            split_ratio: 1 - splitRatio, // Backend expects test_size
                            split_method: splitMethod,
                            time_column: timeColumn
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setDataPrepared(true);
                        setDataShapes(data.shapes);
                    } else {
                        alert('Failed: ' + data.error);
                    }
                } catch (e) {
                    alert('Error: ' + e.message);
                } finally {
                    setPreparingData(false);
                }
            };

            const startNAS = async () => {
                setNasRunning(true);
                try {
                    const res = await fetch('/nas/api/start', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(nasConfig)
                    });
                    if (!res.ok) setNasRunning(false);
                    else fetchNasStatus();
                } catch (e) {
                    setNasRunning(false);
                }
            };

            const stopNAS = async () => {
                try {
                    await fetch('/nas/api/stop', { method: 'POST' });
                    setNasRunning(false);
                } catch (e) {
                    console.error(e);
                }
            };

            const handlePrev = () => window.location.href = '/transformation';

            const toggleFeature = (col) => {
                if (selectedFeatures.includes(col)) {
                    setSelectedFeatures(selectedFeatures.filter(c => c !== col));
                } else {
                    setSelectedFeatures([...selectedFeatures, col]);
                }
            };

            const selectAllFeatures = () => {
                setSelectedFeatures(availableColumns.filter(c => c !== selectedTarget));
            };

            const deselectAllFeatures = () => {
                setSelectedFeatures([]);
            };

            // --- Visualization Logic ---
            const renderArchitecture = () => {
                if (!nasStatus?.current_status?.architecture) return <div className="h-full flex items-center justify-center text-gray-400">Waiting for architecture...</div>;

                const arch = nasStatus.current_status.architecture;
                const inputNeurons = nasStatus.input_shape || 10;
                const outputNeurons = nasStatus.output_shape || 2;
                const layers = ['input', ...arch, 'output'];

                const width = 600;
                const height = 200;
                const startX = 40;
                const layerSpacing = Math.min(80, width / (layers.length + 1));
                const neuronSpacing = 18;
                const maxVisualNeurons = 10;
                const minNeurons = 3;

                const getNeuronCount = (layer, idx) => {
                    if (idx === 0) return Math.min(maxVisualNeurons, Math.max(minNeurons, Math.round(Math.log2(inputNeurons))));
                    if (idx === layers.length - 1) return Math.min(maxVisualNeurons, Math.max(minNeurons, outputNeurons));
                    if (layer.type === 'dropout' || layer.type === 'batch_norm') return 0;
                    return Math.min(maxVisualNeurons, Math.max(minNeurons, Math.round(Math.log2(layer.units || 32))));
                };

                const layerColors = {
                    'input': '#9ca3af',
                    'output': '#10b981',
                    'dense': '#4f46e5',
                    'lstm': '#7c3aed',
                    'gru': '#8b5cf6',
                    'rnn': '#a78bfa',
                    'batch_norm': '#059669',
                    'dropout': '#f59e0b'
                };

                return (
                    <div className="relative w-full h-full">
                        <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet" className="overflow-visible">
                            <defs>
                                <linearGradient id="connectionGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stopColor="#9ca3af" stopOpacity="0.1" />
                                    <stop offset="100%" stopColor="#4f46e5" stopOpacity="0.1" />
                                </linearGradient>
                            </defs>

                            {/* Connections */}
                            {layers.map((layer, idx) => {
                                if (idx === layers.length - 1) return null;
                                const nextLayer = layers[idx + 1];
                                const n1 = getNeuronCount(layer, idx);
                                const n2 = getNeuronCount(nextLayer, idx + 1);
                                if (n1 === 0 || n2 === 0) return null;

                                const x1 = startX + idx * layerSpacing;
                                const x2 = startX + (idx + 1) * layerSpacing;

                                const lines = [];
                                for (let i = 0; i < n1; i++) {
                                    const y1 = (height / 2) - ((n1 - 1) * neuronSpacing / 2) + i * neuronSpacing;
                                    for (let j = 0; j < n2; j++) {
                                        const y2 = (height / 2) - ((n2 - 1) * neuronSpacing / 2) + j * neuronSpacing;
                                        // Optimize: Only draw a subset of connections if too many
                                        if (n1 * n2 > 100 && Math.random() > 0.3) continue;

                                        lines.push(
                                            <line
                                                key={`${idx}-${i}-${j}`}
                                                x1={x1} y1={y1} x2={x2} y2={y2}
                                                stroke="url(#connectionGradient)"
                                                strokeWidth="0.5"
                                            />
                                        );
                                    }
                                }
                                return lines;
                            })}

                            {/* Neurons */}
                            {layers.map((layer, idx) => {
                                const n = getNeuronCount(layer, idx);
                                const x = startX + idx * layerSpacing;

                                let type = 'input';
                                if (idx === layers.length - 1) type = 'output';
                                else if (typeof layer === 'string') type = layer;
                                else type = layer.type;

                                const color = layerColors[type] || '#6b7280';

                                // Special handling for non-neuron layers
                                if (n === 0) {
                                    return (
                                        <g
                                            key={idx}
                                            onMouseEnter={(e) => setHoveredLayer({ info: layer, x: e.clientX, y: e.clientY })}
                                            onMouseLeave={() => setHoveredLayer(null)}
                                            style={{ cursor: 'pointer' }}
                                        >
                                            <rect
                                                x={x - 12} y={height / 2 - 12}
                                                width="24" height="24"
                                                fill={color} opacity="0.8" rx="4"
                                                className="animate-pulse"
                                            />
                                            <text x={x} y={height / 2} fontSize="7" fill="white" fontWeight="bold" textAnchor="middle" dominantBaseline="middle">
                                                {type === 'dropout' ? 'DRP' : 'BN'}
                                            </text>
                                        </g>
                                    );
                                }

                                return (
                                    <g
                                        key={idx}
                                        onMouseEnter={(e) => setHoveredLayer({ info: layer, x: e.clientX, y: e.clientY, type: type })}
                                        onMouseLeave={() => setHoveredLayer(null)}
                                        style={{ cursor: 'pointer' }}
                                    >
                                        {Array.from({ length: n }).map((_, i) => {
                                            const y = (height / 2) - ((n - 1) * neuronSpacing / 2) + i * neuronSpacing;
                                            return (
                                                <circle
                                                    key={`${idx}-${i}`}
                                                    cx={x} cy={y}
                                                    r="5"
                                                    fill={nasRunning ? 'white' : color}
                                                    stroke={color}
                                                    strokeWidth="2"
                                                    className={nasRunning ? "animate-pulse" : ""}
                                                />
                                            );
                                        })}
                                        {/* Layer Label */}
                                        <text x={x} y={height - 10} fontSize="8" fill="#6b7280" textAnchor="middle">
                                            {typeof layer === 'string' ? layer : layer.type}
                                        </text>
                                    </g>
                                );
                            })}
                        </svg>

                        {/* Tooltip */}
                        {hoveredLayer && (
                            <div
                                className="absolute bg-gray-900 text-white text-xs p-2 rounded shadow-lg z-50 pointer-events-none"
                                style={{
                                    left: '50%',
                                    top: '10%',
                                    transform: 'translateX(-50%)'
                                }}
                            >
                                <div className="font-bold uppercase mb-1">{hoveredLayer.type || hoveredLayer.info.type}</div>
                                {hoveredLayer.info.units && <div>Units: {hoveredLayer.info.units}</div>}
                                {hoveredLayer.info.activation && <div>Activation: {hoveredLayer.info.activation}</div>}
                                {hoveredLayer.info.rate && <div>Rate: {hoveredLayer.info.rate}</div>}
                            </div>
                        )}
                    </div>
                );
            };

            const renderRewardGraph = () => {
                if (!nasStatus.history.length) return <div className="h-full flex items-center justify-center text-gray-400">No history yet...</div>;
                const data = nasStatus.history;
                const width = 600;
                const height = 200;
                const padding = { top: 20, right: 30, bottom: 30, left: 50 };

                const rewards = data.map(d => d.reward);
                const min = Math.min(...rewards);
                const max = Math.max(...rewards);
                const range = max - min || 0.1;

                const xScale = i => padding.left + (i / Math.max(1, data.length - 1)) * (width - padding.left - padding.right);
                const yScale = r => height - padding.bottom - ((r - min) / range) * (height - padding.top - padding.bottom);

                const path = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(i)} ${yScale(d.reward)}`).join(' ');

                return (
                    <div className="relative w-full h-full">
                        <svg width="100%" height="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet" className="overflow-visible">
                            {/* Grid Lines */}
                            <line x1={padding.left} y1={padding.top} x2={padding.left} y2={height - padding.bottom} stroke="#e5e7eb" strokeWidth="1" />
                            <line x1={padding.left} y1={height - padding.bottom} x2={width - padding.right} y2={height - padding.bottom} stroke="#e5e7eb" strokeWidth="1" />

                            {/* Y-Axis Ticks (Approximate) */}
                            {[0, 0.25, 0.5, 0.75, 1].map(t => {
                                const val = min + range * t;
                                const y = yScale(val);
                                return (
                                    <g key={t}>
                                        <line x1={padding.left} y1={y} x2={width - padding.right} y2={y} stroke="#f3f4f6" strokeWidth="1" strokeDasharray="4 4" />
                                    </g>
                                );
                            })}

                            {/* Path */}
                            <path d={path} fill="none" stroke="#4f46e5" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />

                            {/* Data Points with Hover */}
                            {data.map((d, i) => (
                                <circle
                                    key={i}
                                    cx={xScale(i)}
                                    cy={yScale(d.reward)}
                                    r={hoveredPoint === i ? 6 : 3}
                                    fill={hoveredPoint === i ? "#4f46e5" : "white"}
                                    stroke="#4f46e5"
                                    strokeWidth="2"
                                    onMouseEnter={() => setHoveredPoint(i)}
                                    onMouseLeave={() => setHoveredPoint(null)}
                                    style={{ cursor: 'pointer', transition: 'all 0.2s' }}
                                />
                            ))}

                            {/* Y-Axis Labels */}
                            <text x={padding.left - 10} y={padding.top} fontSize="10" textAnchor="end" fill="#6b7280">{max.toFixed(4)}</text>
                            <text x={padding.left - 10} y={height - padding.bottom} fontSize="10" textAnchor="end" fill="#6b7280">{min.toFixed(4)}</text>

                            {/* X-Axis Labels */}
                            <text x={padding.left} y={height - 5} fontSize="10" textAnchor="middle" fill="#6b7280">1</text>
                            <text x={width - padding.right} y={height - 5} fontSize="10" textAnchor="middle" fill="#6b7280">{data.length}</text>

                            {/* Axis Titles */}
                            <text x={width / 2} y={height + 15} fontSize="12" textAnchor="middle" fill="#374151" fontWeight="bold">Episode</text>
                            <text x={15} y={height / 2} fontSize="12" textAnchor="middle" fill="#374151" fontWeight="bold" transform={`rotate(-90, 15, ${height / 2})`}>Reward</text>
                        </svg>

                        {/* Tooltip for Graph */}
                        {hoveredPoint !== null && (
                            <div
                                className="absolute bg-white border border-gray-200 text-gray-800 text-xs p-2 rounded shadow-lg z-50 pointer-events-none"
                                style={{
                                    left: `${(hoveredPoint / Math.max(1, data.length - 1)) * 80 + 10}%`, // Approximate positioning
                                    top: '10%'
                                }}
                            >
                                <div className="font-bold">Episode {data[hoveredPoint].episode}</div>
                                <div>Reward: {data[hoveredPoint].reward.toFixed(4)}</div>
                                <div>Depth: {data[hoveredPoint].depth}</div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Header */}
                    <div className="flex justify-between items-center px-8 py-4 flex-shrink-0">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800">Neural Architecture Search</h1>
                                <p className="text-gray-500 mt-1">Automated model building</p>
                            </div>
                            <div className="flex gap-3">
                                <button
                                    onClick={handlePrev}
                                    className="px-4 py-2 rounded-lg font-medium bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 flex items-center gap-2"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                    </svg>
                                    Edit Transformations
                                </button>
                                <a
                                    href="/homepage/"
                                    className="px-4 py-2 rounded-lg font-medium bg-indigo-100 text-indigo-700 hover:bg-indigo-200 flex items-center gap-2"
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                                    </svg>
                                    Home
                                </a>
                            </div>
                    </div>

                    <div className="flex-1 overflow-hidden px-8 pb-4">
                      <div className="max-w-7xl mx-auto h-full grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* Left: Config */}
                            <div className="space-y-6 overflow-y-auto pr-2">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 className="font-bold text-lg mb-4 text-gray-700">Data Preparation</h3>
                                    <div className="space-y-4">
                                        {/* Target Selection */}
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Target Column</label>
                                            <select
                                                value={selectedTarget}
                                                onChange={e => setSelectedTarget(e.target.value)}
                                                disabled={nasRunning}
                                                className="w-full border rounded-lg px-3 py-2"
                                            >
                                                <option value="">Select Target...</option>
                                                {availableColumns.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>

                                        {/* Feature Selection */}
                                        {selectedTarget && (
                                            <div>
                                                <div className="flex justify-between items-center mb-2">
                                                    <label className="block text-sm font-medium text-gray-700">Features ({selectedFeatures.length})</label>
                                                    <div className="text-xs space-x-2">
                                                        <button onClick={selectAllFeatures} className="text-indigo-600 hover:text-indigo-800">All</button>
                                                        <button onClick={deselectAllFeatures} className="text-gray-500 hover:text-gray-700">None</button>
                                                    </div>
                                                </div>
                                                <div className="border rounded-lg p-2 h-32 overflow-y-auto feature-list bg-gray-50">
                                                    {availableColumns.filter(c => c !== selectedTarget).map(col => (
                                                        <label key={col} className="flex items-center space-x-2 p-1 hover:bg-gray-100 rounded cursor-pointer">
                                                            <input
                                                                type="checkbox"
                                                                checked={selectedFeatures.includes(col)}
                                                                onChange={() => toggleFeature(col)}
                                                                disabled={nasRunning}
                                                                className="rounded text-indigo-600 focus:ring-indigo-500"
                                                            />
                                                            <span className="text-sm text-gray-700 truncate">{col}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Split Configuration */}
                                        <div className="border-t pt-4">
                                            <label className="block text-sm font-medium text-gray-700 mb-2">Split Strategy</label>
                                            <div className="flex gap-4 mb-3">
                                                <label className="flex items-center space-x-2 cursor-pointer">
                                                    <input
                                                        type="radio"
                                                        checked={splitMethod === 'random'}
                                                        onChange={() => setSplitMethod('random')}
                                                        disabled={nasRunning}
                                                        className="text-indigo-600"
                                                    />
                                                    <span className="text-sm text-gray-700">Random</span>
                                                </label>
                                                <label className="flex items-center space-x-2 cursor-pointer">
                                                    <input
                                                        type="radio"
                                                        checked={splitMethod === 'time'}
                                                        onChange={() => setSplitMethod('time')}
                                                        disabled={nasRunning}
                                                        className="text-indigo-600"
                                                    />
                                                    <span className="text-sm text-gray-700">Time-based</span>
                                                </label>
                                            </div>

                                            {splitMethod === 'time' && (
                                                <div className="mb-3">
                                                    <select
                                                        value={timeColumn}
                                                        onChange={e => setTimeColumn(e.target.value)}
                                                        disabled={nasRunning}
                                                        className="w-full border rounded-lg px-3 py-2 text-sm"
                                                    >
                                                        <option value="">Select Time Column...</option>
                                                        {availableColumns.map(c => <option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                </div>
                                            )}

                                            <div className="mb-2">
                                                <div className="flex justify-between text-xs text-gray-500 mb-1">
                                                    <span>Train: {(splitRatio * 100).toFixed(0)}%</span>
                                                    <span>Test: {((1 - splitRatio) * 100).toFixed(0)}%</span>
                                                </div>
                                                <input
                                                    type="range"
                                                    min="0.5"
                                                    max="0.95"
                                                    step="0.05"
                                                    value={splitRatio}
                                                    onChange={e => setSplitRatio(parseFloat(e.target.value))}
                                                    disabled={nasRunning}
                                                    className="w-full accent-indigo-600"
                                                />
                                            </div>
                                        </div>

                                        <button
                                            onClick={handlePrepareData}
                                            disabled={nasRunning || preparingData || !selectedTarget || (splitMethod === 'time' && !timeColumn)}
                                            className={`w-full px-4 py-2 rounded-lg font-medium transition-all ${dataPrepared ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-gray-800 text-white hover:bg-gray-900'}`}
                                        >
                                            {preparingData ? 'Preparing...' : dataPrepared ? 'Data Prepared ✓' : 'Prepare Data'}
                                        </button>

                                        {/* Data Shapes Display */}
                                        {dataShapes && (
                                            <div className="text-xs text-gray-500 bg-gray-50 p-2 rounded border">
                                                <div className="flex justify-between">
                                                    <span>Train: {dataShapes.X_train_shape[0]} samples</span>
                                                    <span>Test: {dataShapes.X_test_shape[0]} samples</span>
                                                </div>
                                                <div className="mt-1">Features: {dataShapes.X_train_shape[1]}</div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 className="font-bold text-lg mb-4 text-gray-700">Configuration</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Problem Type</label>
                                            <select
                                                value={nasConfig.problem_type}
                                                onChange={e => setNasConfig({ ...nasConfig, problem_type: e.target.value })}
                                                disabled={nasRunning}
                                                className="w-full border rounded-lg px-3 py-2"
                                            >
                                                <option value="classification">Classification</option>
                                                <option value="regression">Regression</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Target Metric</label>
                                            <input
                                                type="number" step="0.01"
                                                value={nasConfig.target_metric}
                                                onChange={e => setNasConfig({ ...nasConfig, target_metric: parseFloat(e.target.value) })}
                                                disabled={nasRunning}
                                                className="w-full border rounded-lg px-3 py-2"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Patience</label>
                                            <input
                                                type="number"
                                                value={nasConfig.patience}
                                                onChange={e => setNasConfig({ ...nasConfig, patience: parseInt(e.target.value) })}
                                                disabled={nasRunning}
                                                className="w-full border rounded-lg px-3 py-2"
                                            />
                                        </div>
                                        <div className="pt-4">
                                            {!nasRunning ? (
                                                <button
                                                    onClick={startNAS}
                                                    disabled={!dataPrepared}
                                                    className="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-md transition-all"
                                                >
                                                    Start Search
                                                </button>
                                            ) : (
                                                <button
                                                    onClick={stopNAS}
                                                    className="w-full bg-red-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-red-600 shadow-md transition-all"
                                                >
                                                    Stop Search
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Right: Status */}
                            <div className="lg:col-span-2 space-y-6 overflow-y-auto pr-2">
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                        <div className="text-xs font-medium text-gray-500 uppercase mb-1">Status</div>
                                        <div className="flex items-center gap-2">
                                            <div className={`w-3 h-3 rounded-full ${nasRunning ? 'bg-green-500 animate-pulse' : 'bg-gray-400'}`}></div>
                                            <div className="font-bold text-lg text-gray-800">{nasRunning ? 'Running' : 'Idle'}</div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                        <div className="text-xs font-medium text-gray-500 uppercase mb-1">Best Reward</div>
                                        <div className="font-bold text-lg text-indigo-600">
                                            {nasStatus?.history?.length > 0 ? Math.max(...nasStatus.history.map(h => h.reward)).toFixed(4) : '-'}
                                        </div>
                                    </div>
                                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                                        <div className="text-xs font-medium text-gray-500 uppercase mb-1">Current Depth</div>
                                        <div className="font-bold text-lg text-gray-800">{nasStatus?.current_status?.depth || '-'}</div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <h3 className="font-bold text-lg mb-4 text-gray-700">Live Search Status</h3>
                                    <div className="space-y-6">
                                        <div className="h-48 border rounded-lg p-4 bg-gray-50">
                                            {renderArchitecture()}
                                        </div>
                                        <div className="h-48 border rounded-lg p-4 bg-gray-50">
                                            {renderRewardGraph()}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold text-lg text-gray-700">Search History</h3>
                                        <div className="flex gap-2">
                                            <a href="/nas/download_report" className="text-sm text-indigo-600 hover:text-indigo-800">Download Report</a>
                                            <a href="/nas/download_model" className="text-sm text-indigo-600 hover:text-indigo-800">Download Model</a>
                                        </div>
                                    </div>
                                    <div className="max-h-64 overflow-y-auto overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-gray-50 text-gray-600 font-semibold uppercase text-xs sticky top-0 z-10">
                                                <tr>
                                                    <th className="px-4 py-3">Ep</th>
                                                    <th className="px-4 py-3">Depth</th>
                                                    <th className="px-4 py-3">Reward</th>
                                                    <th className="px-4 py-3">Architecture</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {nasStatus.history.map((h, i) => (
                                                    <tr key={i} className="hover:bg-gray-50">
                                                        <td className="px-4 py-2 font-mono text-gray-500">{h.episode}</td>
                                                        <td className="px-4 py-2">{h.depth}</td>
                                                        <td className="px-4 py-2 font-medium text-indigo-600">{h.reward.toFixed(4)}</td>
                                                        <td className="px-4 py-2 text-gray-600">{h.architecture_summary ? h.architecture_summary.join(' → ') : '...'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                      </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NASApp />);
        {% endverbatim %}
    </script>
</body>

</html>
