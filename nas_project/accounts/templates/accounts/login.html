{% extends 'accounts/base_auth.html' %}

{% block content %}
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">User ID</label>
        <input type="text" name="username" id="username" required
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
            placeholder="Enter your ID">
    </div>

    <div class="mb-6">
        <div class="flex justify-between items-center mb-1">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <div class="space-x-2">
                <a href="{% url 'register' %}" class="text-xs text-indigo-600 hover:text-indigo-800">Add New User</a>
                <span class="text-gray-300">|</span>
                <a href="{% url 'forgot_password' %}" class="text-xs text-indigo-600 hover:text-indigo-800">Forgot
                    Password?</a>
            </div>
        </div>
        <div class="relative">
            <input type="password" name="password" id="password" required
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors pr-10"
                placeholder="••••••••">
            <button type="button" onclick="togglePassword('password', this)"
                class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500 hover:text-gray-700 focus:outline-none">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
        </div>
    </div>

    <button type="submit"
        class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors font-medium">
        Sign In
    </button>
</form>
{% endblock %}
