{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - NeuralFlow Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4f46e5 100%);
        }

        .glow {
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(129, 140, 248, 0.4);
            }

            50% {
                box-shadow: 0 0 40px rgba(129, 140, 248, 0.8);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-8">
    <div class="text-center">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-white/10 backdrop-blur rounded-full mb-8 glow">
            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
        </div>

        <h1 class="text-5xl font-bold text-white mb-4">Under Construction</h1>
        <p class="text-xl text-indigo-200 mb-8 max-w-md mx-auto">
            We're working hard to bring you something amazing. This feature will be available soon!
        </p>

        <a href="{% url 'homepage' %}"
            class="inline-flex items-center gap-2 bg-white text-indigo-700 font-semibold px-8 py-4 rounded-xl hover:bg-indigo-100 transition-all shadow-xl hover:shadow-2xl">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>

        <div class="mt-16">
            <p class="text-indigo-300 text-sm">NeuralFlow Studio</p>
        </div>
    </div>
</body>

</html>
