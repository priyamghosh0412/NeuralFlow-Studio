{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Login - FlowMind{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="h-screen flex">
    <!-- Left Side - Login Form -->
    <div class="w-full lg:w-2/5 flex items-center justify-center p-8 bg-white">
        <div class="w-full max-w-md">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
                        <img src="{% static 'images/app_icon.png' %}" alt="FlowMind" class="w-8 h-8">
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">FlowMind</h1>
                </div>
                <p class="text-gray-500 text-sm font-medium">Democratizing AI for Everyone.</p>
            </div>

            {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                <div
                    class="p-3 rounded text-sm {% if message.tags == 'error' %}bg-red-50 text-red-600{% else %}bg-green-50 text-green-600{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- Right Side - Hero Image -->
    <div
        class="hidden lg:flex lg:w-3/5 bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 items-center justify-center p-12">
        <div class="max-w-2xl">
            <img src="{% static 'images/login_background.png' %}" alt="FlowMind"
                class="w-full h-auto rounded-2xl shadow-2xl">
        </div>
    </div>

    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('svg');

            if (input.type === 'password') {
                input.type = 'text';
                // Switch to Eye Off Icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
            } else {
                input.type = 'password';
                // Switch to Eye Icon
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
            }
        }
    </script>
</body>

</html>
