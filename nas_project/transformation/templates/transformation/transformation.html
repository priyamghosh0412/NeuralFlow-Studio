<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAS Framework - Transformation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin
        src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        #root {
            height: 100%;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const STUDIO_MODE = "{{ studio_mode }}";

        {% verbatim %}
        const { useState, useEffect, useRef } = React;

        function TransformationApp() {
            const [options, setOptions] = useState(null);
            const [allColumns, setAllColumns] = useState([]);
            const [preview, setPreview] = useState(null);
            const [originalPreview, setOriginalPreview] = useState(null);
            const [chatHistory, setChatHistory] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedCards, setSelectedCards] = useState({});
            const [transformationQueue, setTransformationQueue] = useState([]);
            const [showSequenceDropdown, setShowSequenceDropdown] = useState(false);
            const [draggedIndex, setDraggedIndex] = useState(null);
            const [showProgressModal, setShowProgressModal] = useState(false);
            const [progressData, setProgressData] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [showDataPreview, setShowDataPreview] = useState(false);
            const [previewMode, setPreviewMode] = useState('after');
            const [resultsData, setResultsData] = useState(null);
            const [columnSummary, setColumnSummary] = useState([]);

            useEffect(() => {
                fetchOptions();
                fetchPreview();
            }, []);

            const fetchOptions = async () => {
                try {
                    const res = await fetch('/transformation/api/get_transformation_options');
                    if (res.ok) {
                        const data = await res.json();
                        setOptions(data.options);
                        setAllColumns(data.columns?.all || []);
                        setColumnSummary(data.column_summary || []);
                        if (data.options && Object.keys(data.options).length > 0) {
                            setSelectedCategory(Object.keys(data.options)[0]);
                        }
                    } else {
                        const data = await res.json();
                        if (data.error === "No data loaded") {
                            window.location.href = '/eda';
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch options", e);
                }
            };

            const fetchPreview = async () => {
                try {
                    const res = await fetch('/transformation/api/get_current_preview');
                    if (res.ok) {
                        const data = await res.json();
                        setPreview({ preview: data.preview, columns: data.columns });
                        if (data.original_preview) {
                            setOriginalPreview({ preview: data.original_preview, columns: data.original_columns });
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch preview", e);
                }
            };

            const handleCardSelection = (card, checked) => {
                if (checked) {
                    setSelectedCards(prev => ({
                        ...prev,
                        [card.id]: {
                            selected: true,
                            columnMode: 'all',
                            columns: [],
                            card: card
                        }
                    }));
                    setTransformationQueue(prev => [...prev, {
                        id: card.id,
                        type: 'card',
                        name: card.title,
                        card: card
                    }]);
                } else {
                    setSelectedCards(prev => {
                        const newState = { ...prev };
                        delete newState[card.id];
                        return newState;
                    });
                    setTransformationQueue(prev => prev.filter(t => t.id !== card.id));
                }
            };

            const handleColumnModeChange = (cardId, mode) => {
                setSelectedCards(prev => ({
                    ...prev,
                    [cardId]: {
                        ...prev[cardId],
                        columnMode: mode,
                        columns: mode === 'all' ? [] : prev[cardId].columns
                    }
                }));
            };

            const handleColumnToggle = (cardId, column) => {
                setSelectedCards(prev => {
                    const current = prev[cardId].columns;
                    const newColumns = current.includes(column)
                        ? current.filter(c => c !== column)
                        : [...current, column];
                    return {
                        ...prev,
                        [cardId]: {
                            ...prev[cardId],
                            columns: newColumns
                        }
                    };
                });
            };

            const handleChatCodeSelect = (index, checked) => {
                const chatItem = chatHistory[index];
                if (checked && chatItem.code) {
                    setTransformationQueue(prev => [...prev, {
                        id: `chat_${index}`,
                        type: 'chat',
                        name: chatItem.title || `AI Transform ${index + 1}`,
                        code: chatItem.code,
                        chatIndex: index
                    }]);
                    setChatHistory(prev => prev.map((msg, i) =>
                        i === index ? { ...msg, selected: true } : msg
                    ));
                } else {
                    setTransformationQueue(prev => prev.filter(t => t.id !== `chat_${index}`));
                    setChatHistory(prev => prev.map((msg, i) =>
                        i === index ? { ...msg, selected: false } : msg
                    ));
                }
            };

            const handleChatCodeEdit = (index, newCode) => {
                setChatHistory(prev => prev.map((msg, i) =>
                    i === index ? { ...msg, code: newCode } : msg
                ));
                setTransformationQueue(prev => prev.map(t =>
                    t.id === `chat_${index}` ? { ...t, code: newCode } : t
                ));
            };

            const handleDragStart = (index) => {
                setDraggedIndex(index);
            };

            const handleDragOver = (e, index) => {
                e.preventDefault();
                if (draggedIndex === null || draggedIndex === index) return;

                const newQueue = [...transformationQueue];
                const draggedItem = newQueue[draggedIndex];
                newQueue.splice(draggedIndex, 1);
                newQueue.splice(index, 0, draggedItem);
                setTransformationQueue(newQueue);
                setDraggedIndex(index);
            };

            const handleDragEnd = () => {
                setDraggedIndex(null);
            };

            const handleApplySelected = async () => {
                if (transformationQueue.length === 0) {
                    alert('Please select at least one transformation');
                    return;
                }

                setShowProgressModal(true);
                setIsProcessing(true);
                setProgressData(transformationQueue.map(t => ({
                    name: t.name,
                    status: 'pending',
                    message: ''
                })));

                try {
                    const transformations = transformationQueue.map(item => {
                        if (item.type === 'card') {
                            const selection = selectedCards[item.id];
                            return {
                                id: item.card.id,
                                name: item.name,
                                title: item.card.title,
                                description: item.card.description,
                                transformation_type: item.card.function,
                                params: {
                                    column_mode: selection.columnMode,
                                    selected_columns: selection.columns
                                },
                                affected_columns: selection.columnMode === 'all' ? ['__ALL_COLUMNS__'] : []
                            };
                        } else {
                            return {
                                id: item.id,
                                name: item.name,
                                title: 'Custom Transformation',
                                description: 'AI-generated code transformation',
                                transformation_type: 'chat_transform',
                                chat_id: item.chatIndex,
                                edited_code: item.code,
                                params: {},
                                affected_columns: []
                            };
                        }
                    });

                    const res = await fetch('/transformation/api/apply_selected_batch', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ transformations })
                    });

                    const data = await res.json();

                    if (data.success) {
                        setProgressData(data.results.map(r => ({
                            name: r.name,
                            status: r.status,
                            message: r.message,
                            resolution: r.resolution,
                            failed_code: r.failed_code
                        })));
                        setResultsData(data);
                        setPreview({ preview: data.final_preview.preview, columns: data.final_preview.columns });
                        if (data.original_preview) {
                            setOriginalPreview({ preview: data.original_preview.preview, columns: data.original_preview.columns });
                        }
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    alert('Error: ' + e.message);
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleDownloadReport = async () => {
                window.open('/transformation/api/download_report', '_blank');
            };

            const handleChatSubmit = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;

                const userMsg = chatInput;
                setChatInput('');
                setChatHistory(prev => [...prev, { role: 'user', content: userMsg }]);

                try {
                    const res = await fetch('/transformation/api/chat_transform', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    const data = await res.json();
                    if (data.success) {
                        setChatHistory(prev => [...prev, {
                            role: 'ai',
                            content: data.response.understanding,
                            title: data.response.title,
                            code: data.response.code_preview,
                            selected: false
                        }]);
                    }
                } catch (e) {
                    setChatHistory(prev => [...prev, { role: 'ai', content: 'Error: ' + e.message }]);
                }
            };

            const handlePrev = () => window.location.href = '/eda';
            const handleNext = () => {
                const mode = STUDIO_MODE;
                if (mode === 'visual_studio') {
                    window.location.href = '/visual-studio/';
                } else {
                    window.location.href = '/nas';
                }
            };

            const allComplete = progressData.length > 0 && progressData.every(p => p.status !== 'pending' && p.status !== 'running');

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">Data Transformation</h1>
                            <p className="text-sm text-gray-500">Clean and prepare your data</p>
                        </div>
                        <div className="flex gap-3 items-center">
                            <button onClick={handlePrev} className="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-50 border border-gray-300 transition-colors">
                                Previous
                            </button>

                            {/* Sequence Dropdown */}
                            <div className="relative">
                                <button
                                    onClick={() => setShowSequenceDropdown(!showSequenceDropdown)}
                                    className="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors flex items-center gap-2"
                                >
                                    <span className="bg-indigo-600 text-white px-2 py-0.5 rounded-full text-xs font-bold">
                                        {transformationQueue.length}
                                    </span>
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" />
                                    </svg>
                                </button>

                                {showSequenceDropdown && (
                                    <div className="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-xl border border-gray-200 py-2 z-50">
                                        <div className="px-4 py-2 border-b border-gray-100">
                                            <h3 className="font-semibold text-gray-800 text-sm">Transformation Sequence</h3>
                                            <p className="text-xs text-gray-500">Drag to reorder</p>
                                        </div>
                                        {transformationQueue.length === 0 ? (
                                            <p className="px-4 py-6 text-center text-sm text-gray-400">No transformations selected</p>
                                        ) : (
                                            <div className="max-h-96 overflow-y-auto">
                                                {transformationQueue.map((item, index) => (
                                                    <div
                                                        key={item.id}
                                                        draggable
                                                        onDragStart={() => handleDragStart(index)}
                                                        onDragOver={(e) => handleDragOver(e, index)}
                                                        onDragEnd={handleDragEnd}
                                                        className="px-4 py-3 border-b border-gray-50 hover:bg-gray-50 cursor-move flex items-center gap-3"
                                                    >
                                                        <span className="text-xs font-bold text-gray-400">{index + 1}</span>
                                                        <svg className="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />
                                                        </svg>
                                                        <div className="flex-1">
                                                            <p className="text-sm font-medium text-gray-800">{item.name}</p>
                                                            <p className="text-xs text-gray-500">{item.type === 'card' ? 'Standard' : 'Custom Code'}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>

                            <button
                                onClick={handleApplySelected}
                                disabled={transformationQueue.length === 0}
                                className="px-6 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                Apply Selected
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden">
                        {/* Left Sidebar: Chat Assistant */}
                        <aside className="w-96 bg-white border-r border-gray-200 flex flex-col">
                            <div className="p-4 border-b border-gray-100">
                                <h2 className="font-semibold text-gray-800 flex items-center gap-2">
                                    <svg className="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                                    </svg>
                                    AI Assistant
                                </h2>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {chatHistory.length === 0 && (
                                    <div className="text-center text-gray-400 text-sm mt-10">
                                        <p>Ask me to transform your data.</p>
                                        <p className="mt-2 text-xs">Example: "Remove outliers from price column"</p>
                                    </div>
                                )}
                                {chatHistory.map((msg, i) => (
                                    <div key={i} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                        <div className={`max-w-[90%] p-3 rounded-2xl text-sm ${msg.role === 'user'
                                            ? 'bg-indigo-600 text-white rounded-br-none'
                                            : 'bg-gray-100 text-gray-800 rounded-bl-none'
                                            }`}>
                                            <p>{msg.content}</p>
                                        </div>
                                        {msg.code && (
                                            <div className="mt-2 w-full bg-gray-900 rounded-lg overflow-hidden">
                                                <div className="flex justify-between items-center px-3 py-2 bg-gray-800">
                                                    <span className="text-xs text-gray-400">Generated Code</span>
                                                    <label className="flex items-center gap-2 cursor-pointer">
                                                        <input
                                                            type="checkbox"
                                                            checked={msg.selected || false}
                                                            onChange={(e) => handleChatCodeSelect(i, e.target.checked)}
                                                            className="rounded border-gray-600"
                                                        />
                                                        <span className="text-xs text-gray-300">Select</span>
                                                    </label>
                                                </div>
                                                <textarea
                                                    value={msg.code}
                                                    onChange={(e) => handleChatCodeEdit(i, e.target.value)}
                                                    className="w-full bg-gray-900 text-green-400 font-mono text-xs p-3 resize-none outline-none"
                                                    rows="4"
                                                    style={{ minHeight: '80px' }}
                                                />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <div className="p-4 border-t border-gray-200">
                                <form onSubmit={handleChatSubmit} className="flex gap-2">
                                    <input
                                        type="text"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        placeholder="Type a command..."
                                        className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                    />
                                    <button type="submit" className="bg-indigo-600 text-white p-2 rounded-lg hover:bg-indigo-700 transition-colors">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                                        </svg>
                                    </button>
                                </form>
                            </div>
                        </aside>

                        {/* Main Content */}
                        <div className="flex-1 flex flex-col overflow-hidden bg-gray-50">
                            {/* Transformation Categories Tabs */}
                            <div className="bg-white border-b border-gray-200 px-6 pt-4">
                                <div className="flex gap-6 overflow-x-auto scrollbar-hide">
                                    {options && Object.entries(options).map(([key, categoryData]) => (
                                        <button
                                            key={key}
                                            onClick={() => setSelectedCategory(key)}
                                            className={`pb-4 text-sm font-medium border-b-2 transition-colors whitespace-nowrap ${selectedCategory === key
                                                ? 'border-indigo-600 text-indigo-600'
                                                : 'border-transparent text-gray-500 hover:text-gray-700'
                                                }`}
                                        >
                                            {categoryData.title}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Cards Grid */}
                            <div className="flex-1 p-6 overflow-y-auto">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {selectedCategory && options && options[selectedCategory].cards.map(card => (
                                        <div key={card.id} className={`bg-white p-4 rounded-xl border-2 transition-all ${selectedCards[card.id]?.selected
                                            ? 'border-indigo-500 shadow-lg'
                                            : 'border-gray-200 hover:border-indigo-300 hover:shadow-md'
                                            }`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="font-semibold text-gray-800 flex-1">{card.title}</h3>
                                                <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium whitespace-nowrap ml-2 ${card.impact === 'High' ? 'bg-red-100 text-red-600' :
                                                    card.impact === 'Medium' ? 'bg-yellow-100 text-yellow-600' :
                                                        'bg-green-100 text-green-600'
                                                    }`}>
                                                    {card.impact}
                                                </span>
                                            </div>
                                            <p className="text-xs text-gray-500 mb-4 line-clamp-2">{card.description}</p>

                                            {/* Checkbox Selection */}
                                            <label className="flex items-center gap-2 mb-3 cursor-pointer">
                                                <input
                                                    type="checkbox"
                                                    checked={selectedCards[card.id]?.selected || false}
                                                    onChange={(e) => handleCardSelection(card, e.target.checked)}
                                                    className="rounded border-gray-300"
                                                />
                                                <span className="text-sm text-gray-700">Select for transformation</span>
                                            </label>

                                            {/* Column Targeting Options */}
                                            {selectedCards[card.id]?.selected && (
                                                <div className="mt-3 p-3 bg-gray-50 rounded-lg space-y-2">
                                                    <p className="text-xs font-medium text-gray-600 mb-2">Column Selection:</p>
                                                    <div className="space-y-2">
                                                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                                                            <input
                                                                type="radio"
                                                                name={`mode-${card.id}`}
                                                                checked={selectedCards[card.id]?.columnMode === 'all'}
                                                                onChange={() => handleColumnModeChange(card.id, 'all')}
                                                            />
                                                            <span>All Columns</span>
                                                        </label>
                                                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                                                            <input
                                                                type="radio"
                                                                name={`mode-${card.id}`}
                                                                checked={selectedCards[card.id]?.columnMode === 'include'}
                                                                onChange={() => handleColumnModeChange(card.id, 'include')}
                                                            />
                                                            <span>Include Columns</span>
                                                        </label>
                                                        <label className="flex items-center gap-2 text-xs cursor-pointer">
                                                            <input
                                                                type="radio"
                                                                name={`mode-${card.id}`}
                                                                checked={selectedCards[card.id]?.columnMode === 'exclude'}
                                                                onChange={() => handleColumnModeChange(card.id, 'exclude')}
                                                            />
                                                            <span>Exclude Columns</span>
                                                        </label>
                                                    </div>

                                                    {/* Column Multi-select */}
                                                    {selectedCards[card.id]?.columnMode !== 'all' && (
                                                        <div className="mt-2 max-h-32 overflow-y-auto border border-gray-200 rounded p-2 bg-white">
                                                            {allColumns.map(col => (
                                                                <label key={col} className="flex items-center gap-2 text-xs p-1 hover:bg-gray-50 cursor-pointer">
                                                                    <input
                                                                        type="checkbox"
                                                                        checked={selectedCards[card.id]?.columns.includes(col)}
                                                                        onChange={() => handleColumnToggle(card.id, col)}
                                                                        className="rounded border-gray-300"
                                                                    />
                                                                    <span className="truncate">{col}</span>
                                                                </label>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {/* Dataset Overview Table */}
                                <div className="mt-8 mb-6">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                                        <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        Dataset Overview
                                    </h3>
                                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
                                        <div className="max-h-[600px] overflow-y-auto">
                                            <table className="min-w-full divide-y divide-gray-200">
                                                <thead className="bg-gray-50 sticky top-0 z-10 shadow-sm">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Column Name</th>
                                                        <th className="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Missing %</th>
                                                        <th className="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Unique Values</th>
                                                        <th className="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">AI Suggestion</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white divide-y divide-gray-200">
                                                    {columnSummary.length > 0 ? columnSummary.map((col, idx) => (
                                                        <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{col.name}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                                <div className="flex items-center gap-2">
                                                                    <div className={`w-16 h-1.5 rounded-full overflow-hidden bg-gray-100`}>
                                                                        <div className={`h-full rounded-full ${col.missing_pct > 0 ? 'bg-red-500' : 'bg-green-500'}`} style={{ width: `${Math.max(col.missing_pct, 5)}%` }}></div>
                                                                    </div>
                                                                    <span className={col.missing_pct > 0 ? 'text-red-600 font-medium' : 'text-gray-500'}>
                                                                        {col.missing_pct}%
                                                                    </span>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{col.unique_count}</td>
                                                            <td className="px-6 py-4 whitespace-nowrap text-sm">
                                                                {col.suggestion ? (
                                                                    <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100">
                                                                        <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                                                        </svg>
                                                                        {col.suggestion}
                                                                    </span>
                                                                ) : (
                                                                    <span className="text-gray-400 text-xs italic">No issues detected</span>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    )) : (
                                                        <tr>
                                                            <td colSpan="4" className="px-6 py-8 text-center text-gray-400 italic">No columns available</td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </main>

                    {/* Progress Modal */}
                    {showProgressModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-8 max-w-3xl w-full max-h-[80vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-gray-800">Applying Transformations</h2>
                                    {!isProcessing && (
                                        <button
                                            onClick={() => setShowProgressModal(false)}
                                            className="text-gray-400 hover:text-gray-600 transition-colors p-2 rounded-full hover:bg-gray-100"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                                            </svg>
                                        </button>
                                    )}
                                </div>

                                {/* Progress Steps */}
                                <div className="space-y-4 mb-6">
                                    {progressData.map((step, i) => (
                                        <div key={i} className="border border-gray-200 rounded-lg p-4">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-medium text-gray-800">
                                                    {i + 1}. {step.name}
                                                </span>
                                                {step.status === 'success' && (
                                                    <span className="text-green-600 font-bold text-xl">✓</span>
                                                )}
                                                {step.status === 'failed' && (
                                                    <span className="text-red-600 font-bold text-xl">✗</span>
                                                )}
                                                {step.status === 'running' && (
                                                    <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div>
                                                )}
                                            </div>
                                            <div className="bg-gray-200 rounded-full h-2 mb-2">
                                                <div className={`h-2 rounded-full transition-all ${step.status === 'success' ? 'bg-green-600 w-full' :
                                                    step.status === 'failed' ? 'bg-red-600 w-full' :
                                                        step.status === 'running' ? 'bg-indigo-600 w-1/2 animate-pulse' : 'w-0'
                                                    }`}></div>
                                            </div>
                                            {step.message && (
                                                <p className={`text-sm ${step.status === 'failed' ? 'text-red-600 font-medium' : 'text-gray-600'
                                                    }`}>{step.message}</p>
                                            )}
                                            {step.status === 'failed' && step.resolution && (
                                                <div className="mt-3 bg-red-50 border border-red-100 rounded-lg p-3">
                                                    <h4 className="text-xs font-bold text-red-800 uppercase mb-1 flex items-center gap-1">
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                                        </svg>
                                                        AI Diagnosis
                                                    </h4>
                                                    <p className="text-sm text-red-700 mb-2"><strong>Why it failed:</strong> {step.resolution.explanation}</p>
                                                    <p className="text-sm text-red-700 bg-red-100 p-2 rounded"><strong>Suggested Fix:</strong> {step.resolution.resolution}</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                {/* Action Buttons */}
                                {allComplete && !isProcessing && (
                                    <div className="flex gap-3 justify-end border-t border-gray-200 pt-6">
                                        <button
                                            onClick={handleDownloadReport}
                                            className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors flex items-center gap-2"
                                        >
                                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                            </svg>
                                            Download Report
                                        </button>
                                        <button
                                            onClick={() => setShowDataPreview(!showDataPreview)}
                                            className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
                                        >
                                            {showDataPreview ? 'Hide' : 'Show'} Data Preview
                                        </button>
                                        <button
                                            onClick={handleNext}
                                            className="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors"
                                        >
                                            {STUDIO_MODE === 'visual_studio' ? 'Next: Visual Intelligence Studio' : 'Next: Automated Modeling'}
                                        </button>
                                    </div>
                                )}

                                {/* Data Preview in Modal */}
                                {showDataPreview && allComplete && (
                                    <div className="mt-6 border-t border-gray-200 pt-6">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-semibold text-gray-800">Data Preview</h3>
                                            <div className="flex bg-gray-100 p-1 rounded-lg">
                                                <button
                                                    onClick={() => setPreviewMode('before')}
                                                    className={`px-4 py-1.5 text-xs font-medium rounded-md transition-all ${previewMode === 'before'
                                                        ? 'bg-white text-gray-800 shadow-sm'
                                                        : 'text-gray-500 hover:text-gray-700'
                                                        }`}
                                                >
                                                    Before
                                                </button>
                                                <button
                                                    onClick={() => setPreviewMode('after')}
                                                    className={`px-4 py-1.5 text-xs font-medium rounded-md transition-all ${previewMode === 'after'
                                                        ? 'bg-white text-indigo-600 shadow-sm'
                                                        : 'text-gray-500 hover:text-gray-700'
                                                        }`}
                                                >
                                                    After
                                                </button>
                                            </div>
                                        </div>
                                        <div className="max-h-96 overflow-auto border border-gray-200 rounded-lg">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-gray-50 sticky top-0">
                                                    <tr>
                                                        {(previewMode === 'before' ? originalPreview : preview)?.columns.map(col => (
                                                            <th key={col} className="p-3 font-medium text-gray-600 border-b border-gray-200 whitespace-nowrap text-xs uppercase tracking-wider">
                                                                {col}
                                                            </th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {(previewMode === 'before' ? originalPreview : preview)?.preview.map((row, i) => (
                                                        <tr key={i} className="hover:bg-gray-50">
                                                            {(previewMode === 'before' ? originalPreview : preview)?.columns.map(col => (
                                                                <td key={col} className="p-3 text-gray-700 whitespace-nowrap">
                                                                    {row[col] !== null ? row[col] : <span className="text-gray-300 italic">null</span>}
                                                                </td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TransformationApp />);
        {% endverbatim %}
    </script>
</body>

</html>
