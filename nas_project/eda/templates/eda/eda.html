                                                            <p className="text-sm text-red-700">{alert.message}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {/* Quick Actions */}
                                <div className="space-y-4">
                                    <h2 className="text-2xl font-bold border-b-4 border-pink-300 inline-block pr-4">Actions</h2>
                                    <div className="bg-[#2d2a26] text-white border-2 border-[#2d2a26] rounded-2xl p-6 shadow-[4px_4px_0px_#2d2a26]">
                                        <div className="space-y-3">
                                            <button onClick={handleGenerateReport} className="w-full py-3 px-4 rounded-xl bg-gray-800 hover:bg-gray-700 border border-gray-700 flex items-center gap-3 transition-colors group">
                                                <span className="group-hover:scale-110 transition-transform">📊</span> Generate Report
                                            </button>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                    {/* Drawer Overlay */}
                    {inspectingColumn && (
                        <div className="fixed inset-0 bg-[#2d2a26]/50 backdrop-blur-sm z-40" onClick={() => setInspectingColumn(null)}></div>

                    <div className={`fixed top-0 right-0 h-full w-[480px] bg-white border-l-4 border-[#2d2a26] shadow-2xl z-50 p-8 overflow-y-auto transform transition-transform duration-300 ease-in-out ${inspectingColumn ? 'translate-x-0' : 'translate-x-full'}`}>
                        {activeColumnData && (
                            <>
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-3xl font-bold">{activeColumnData.name}</h2>
                                    <button onClick={() => setInspectingColumn(null)} className="p-2 hover:bg-gray-100 rounded-full transition-colors">

                                    </button>
                                </div>

                                <div className="space-y-8">
                                    {/* Stats Grid */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-4 bg-gray-50 rounded-xl border-2 border-gray-100">
                                            <p className="text-sm text-gray-500 uppercase font-bold mb-1">Type</p>
                                            <p className="text-xl font-bold text-blue-600">{activeColumnData.dtype}</p>
                                        </div>

                                        {!activeColumnData.numeric && (
                                            <>
                                                <div className="p-4 bg-gray-50 rounded-xl border-2 border-gray-100">
                                                    <p className="text-sm text-gray-500 uppercase font-bold mb-1">Unique</p>
                                                    <p className="text-xl font-bold text-green-600">{activeColumnData.unique_count}</p>
                                                </div>
                                                <div className="p-4 bg-gray-50 rounded-xl border-2 border-gray-100">
                                                    <p className="text-sm text-gray-500 uppercase font-bold mb-1">Cardinality</p>
                                                    <p className="text-xl font-bold text-purple-600">{activeColumnData.cardinality}</p>
                                                </div>

                                        )}

                                        <div className="p-4 bg-gray-50 rounded-xl border-2 border-gray-100">
                                            <p className="text-sm text-gray-500 uppercase font-bold mb-1">Missing</p>
                                            <p className="text-xl font-bold text-gray-800">{activeColumnData.missing_pct}%</p>
                                        </div>

                                    {/* Histogram for Numeric */}
                                    {activeColumnData.numeric && activeColumnData.histogram && (
                                        <div className="bg-white border-2 border-[#2d2a26] rounded-2xl p-6 shadow-[4px_4px_0px_#2d2a26]">

                                                    return (
                                                        <div key={i} className="flex-1 bg-indigo-500 hover:bg-indigo-600 transition-colors rounded-t-sm relative group" style={{ height: `${heightPct}%` }}>

                                                    <div key={i} className="flex justify-between items-center">
                                                        <span className="font-medium truncate max-w-[150px]">{val}</span>
                                                        <div className="flex items-center gap-2">
                                                            <div className="w-24 h-2 bg-gray-100 rounded-full overflow-hidden">
                                                                <div className="h-full bg-blue-500" style={{ width: `${activeColumnData.categorical.top_5_pct[val]}%` }}></div>
                                                            </div>
                                                            <span className="text-sm text-gray-500">{count}</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {/* Numeric Stats */}
                                    {activeColumnData.numeric && (
                                        <div className="bg-yellow-50 border-2 border-[#2d2a26] rounded-2xl p-6 shadow-[4px_4px_0px_#2d2a26]">
                                            <h3 className="text-lg font-bold mb-4">Statistics</h3>
                                            <div className="space-y-2 text-sm">
                                                <div className="grid grid-cols-2 gap-4 mb-4">
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Min</p>
                                                        <p className="font-mono font-bold">{activeColumnData.numeric.min?.toFixed(2)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Max</p>
                                                        <p className="font-mono font-bold">{activeColumnData.numeric.max?.toFixed(2)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Mean</p>
                                                        <p className="font-mono font-bold">{activeColumnData.numeric.mean?.toFixed(2)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Median</p>
                                                        <p className="font-mono font-bold">{activeColumnData.numeric.median?.toFixed(2)}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Std Dev</p>
                                                        <p className="font-mono font-bold">{activeColumnData.numeric.std?.toFixed(2)}</p>
                                                    </div>
                                                </div>

                                                <div className="border-t border-yellow-200 pt-2">
                                                    <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Percentiles</p>
                                                    <div className="flex justify-between text-xs">
                                                        <div className="text-center">
                                                            <p className="text-gray-500">P50</p>
                                                            <p className="font-mono font-bold">{activeColumnData.numeric.percentiles?.p50?.toFixed(2)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-gray-500">P75</p>
                                                            <p className="font-mono font-bold">{activeColumnData.numeric.percentiles?.p75?.toFixed(2)}</p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-gray-500">P95</p>
                                                            <p className="font-mono font-bold">{activeColumnData.numeric.percentiles?.p95?.toFixed(2)}</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="border-t border-yellow-200 pt-2 mt-2">
                                                    <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Sanity Checks</p>
                                                    <div className="flex justify-between text-xs">
                                                        <span>Zero Values:</span>
                                                        <span className={activeColumnData.numeric.zeros_pct > 0 ? "text-orange-600 font-bold" : "text-green-600 font-bold"}>
                                                            {activeColumnData.numeric.zeros_pct}%
                                                        </span>
                                                    </div>
                                                    <div className="flex justify-between text-xs">
                                                        <span>Negative Values:</span>
                                                        <span className={activeColumnData.numeric.negative_pct > 0 ? "text-red-600 font-bold" : "text-green-600 font-bold"}>
                                                            {activeColumnData.numeric.negative_pct}%
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Datetime Stats */}
                                    {activeColumnData.datetime && (
                                        <div className="bg-blue-50 border-2 border-[#2d2a26] rounded-2xl p-6 shadow-[4px_4px_0px_#2d2a26]">
                                            <h3 className="text-lg font-bold mb-4">Time Analysis</h3>
                                            <div className="space-y-4 text-sm">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">Start</p>
                                                        <p className="font-mono font-bold text-xs">{activeColumnData.datetime.min_date}</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-gray-500 text-xs uppercase font-bold">End</p>
                                                        <p className="font-mono font-bold text-xs">{activeColumnData.datetime.max_date}</p>
                                                    </div>
                                                </div>

                                                <div className="flex justify-between border-b border-blue-200 pb-2">
                                                    <span className="text-gray-600">Granularity</span>
                                                    <span className="font-bold">{activeColumnData.datetime.frequency}</span>
                                                </div>
                                                <div className="flex justify-between border-b border-blue-200 pb-2">
                                                    <span className="text-gray-600">Missing Dates</span>
                                                    <span className="font-bold">{activeColumnData.missing_pct}%</span>
                                                </div>

                                                {activeColumnData.datetime.peak_activity && (
                                                    <div className="pt-2">
                                                        <p className="text-xs font-bold text-gray-500 mb-2 uppercase">Activity Extremes</p>
                                                        <div className="flex justify-between text-xs mb-1">
                                                            <span className="text-green-700 font-bold">Peak:</span>
                                                            <span>{activeColumnData.datetime.peak_activity.date} ({activeColumnData.datetime.peak_activity.count})</span>
                                                        </div>
                                                        <div className="flex justify-between text-xs">
                                                            <span className="text-red-700 font-bold">Low:</span>
                                                            <span>{activeColumnData.datetime.low_activity.date} ({activeColumnData.datetime.low_activity.count})</span>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EDAApp />);
        {% endverbatim %}
    </script>
</body>

</html>
